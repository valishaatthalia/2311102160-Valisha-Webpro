<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Video</title>
</head>

<body>
    <audio controls>

        audio element.

        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/ogg"> Your browser does not support HTML5
        video.
    </video>
    <p>
        Video courtesy of
        <a href="https://www.bigbuckbunny.org/" target="_blank">Big Buck Bunny</a>.
    </p>
</body>

</html>
