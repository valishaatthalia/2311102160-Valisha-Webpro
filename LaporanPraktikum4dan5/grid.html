<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bootstrap Grid Example</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.container-box{
    background: #2f6fdd;
    color: white;
    font-weight: bold;
    padding: 8px;
    margin-bottom: 10px;
}

.fluid-box{
    background: #e53935;
    color: white;
    font-weight: bold;
    padding: 8px;
}

.box{
    color: white;
    padding: 6px;
    font-size: 14px;
}

.red{background:#e53935;}
.blue{background:#2f6fdd;}
.gray{background:#eaeaea; color:black;}
</style>

</head>
<body>

<div class="container">

<div class="container-box">
Ini Container
</div>

</div>

<div class="container-fluid">

<div class="fluid-box">
Ini Container Fluid
</div>

<div class="row">
<div class="col-12 col-md-8 box red">
.col-12 .col-md-8
</div>

<div class="col-6 col-md-4 box blue">
.col-6 .col-md-4
</div>
</div>

<div class="row">
<div class="col-6 col-md-4 box gray">
.col-6 .col-md-4
</div>

<div class="col-6 box gray">
.col-6
</div>
</div>

</div>

</body>
</html>
