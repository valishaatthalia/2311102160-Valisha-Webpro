<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Container vs Container Fluid</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .box-container{
            background-color: #1e73e8;
            color: white;
            font-size: 28px;
            padding: 10px;
            margin-top: 20px;
        }

        .box-fluid{
            background-color: #dc3545;
            color: white;
            font-size: 28px;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Container -->
    <div class="container">
        <div class="box-container">
            Ini Container
        </div>
    </div>

    <!-- Container Fluid -->
    <div class="container-fluid">
        <div class="box-fluid">
            Ini Container Fluid
        </div>
    </div>

</body>
</html>
